services:
  backend:
    build:
      context: ./backend
      target: dev
    container_name: dashboard-backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - ./backend/app:/app/app
      - ./backend/app/db/db.sqlite3:/app/app/db/db.sqlite3
    networks:
      - dashboard-net

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: dashboard-frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - dashboard-net

  nginx:
    image: nginx:1.25
    container_name: dashboard-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - dashboard-net

networks:
  dashboard-net:
    driver: bridge
